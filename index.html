<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدير - عيادات الشفاء</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --primary:#7c3aed;--primary-light:#ede9fe;--primary-dark:#5b21b6;
  --accent:#a78bfa;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --dark:#0f172a;--dark2:#1e293b;--mid:#334155;--muted:#64748b;
  --border:#e2e8f0;--bg:#f5f3ff;--card:#fff;--sidebar-w:270px;
  --radius:14px;--shadow:0 2px 8px rgba(124,58,237,.1);--shadow-lg:0 8px 32px rgba(124,58,237,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--dark);direction:rtl}
.hidden{display:none!important}

/* LOGIN */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#7c3aed 100%);
  position:relative;overflow:hidden;
}
#loginPage::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 80%,rgba(167,139,250,.15) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.1) 0%,transparent 50%);
}
.login-card{
  background:rgba(255,255,255,.97);border-radius:24px;padding:48px 40px;
  width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.4);position:relative;z-index:1;
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon-wrap{
  width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;box-shadow:0 8px 24px rgba(124,58,237,.4);
}
.login-logo .icon-wrap i{font-size:2rem;color:white}
.login-logo h1{font-size:1.6rem;color:var(--dark);font-weight:800}
.login-logo p{color:var(--muted);font-size:.9rem;margin-top:4px}
.login-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#fef3c7;color:#92400e;padding:6px 14px;border-radius:8px;font-size:.82rem;font-weight:700;margin-bottom:24px;
}
.form-group{margin-bottom:18px}
.form-group label{display:block;margin-bottom:7px;font-weight:600;font-size:.88rem;color:var(--mid)}
.form-group input,.form-group select{
  width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:12px;font-size:.95rem;font-family:inherit;transition:all .2s;
}
.form-group input:focus,.form-group select:focus{
  outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,.12);
}
.btn{padding:12px 22px;border:none;border-radius:12px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;font-family:inherit;justify-content:center}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;width:100%}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.4)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-secondary{background:var(--mid);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--mid)}
.btn-sm{padding:8px 16px;font-size:.85rem;border-radius:10px}
.btn-xs{padding:6px 12px;font-size:.78rem;border-radius:8px}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}

/* LAYOUT */
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{
  background:linear-gradient(180deg,var(--dark2) 0%,#0f172a 100%);
  color:#fff;padding:24px 16px;position:fixed;right:0;top:0;height:100vh;
  width:var(--sidebar-w);overflow-y:auto;z-index:50;display:flex;flex-direction:column;
}
.sidebar-logo{text-align:center;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:20px}
.sidebar-logo .s-icon{
  width:60px;height:60px;background:linear-gradient(135deg,var(--primary),var(--accent));
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;font-size:1.4rem;box-shadow:0 8px 20px rgba(124,58,237,.4);
}
.sidebar-logo h2{font-size:1rem;color:#e2e8f0;font-weight:700}
.sidebar-logo .role{
  font-size:.75rem;background:rgba(124,58,237,.3);color:var(--accent);
  padding:3px 10px;border-radius:8px;margin-top:6px;display:inline-block;
}
.nav-section{margin-bottom:6px}
.nav-label{font-size:.7rem;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.08em;padding:0 12px;margin-bottom:6px;margin-top:14px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:all .2s;color:#94a3b8;font-size:.88rem;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(124,58,237,.25);color:var(--accent);font-weight:600;border-right:3px solid var(--primary)}
.nav-item i{width:20px;text-align:center;font-size:.9rem}
.sidebar-footer{margin-top:auto;border-top:1px solid rgba(255,255,255,.07);padding-top:16px}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:10px}
.user-chip .av{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.user-chip .uc-name{font-weight:600;color:#e2e8f0;font-size:.85rem}
.user-chip .uc-role{color:var(--accent);font-size:.75rem}

/* MAIN */
.main{margin-right:var(--sidebar-w);padding:28px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:var(--radius);padding:18px 24px;box-shadow:var(--shadow);margin-bottom:24px}
.top-bar h1{font-size:1.3rem;color:var(--dark);font-weight:800}
.tb-right{display:flex;align-items:center;gap:10px}
.admin-badge{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:6px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);transition:transform .2s;position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.stat-card::before{content:'';position:absolute;top:-20px;left:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.stat-card.sc-purple::before{background:var(--primary)}
.stat-card.sc-green::before{background:var(--success)}
.stat-card.sc-orange::before{background:var(--warning)}
.stat-card.sc-red::before{background:var(--danger)}
.sc-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:14px}
.sc-purple .sc-icon{background:#ede9fe;color:var(--primary)}
.sc-green .sc-icon{background:#d1fae5;color:var(--success)}
.sc-orange .sc-icon{background:#fef3c7;color:var(--warning)}
.sc-red .sc-icon{background:#fee2e2;color:var(--danger)}
.sc-val{font-size:1.8rem;font-weight:800;color:var(--dark)}
.sc-label{font-size:.82rem;color:var(--muted);margin-top:4px}
.sc-delta{font-size:.78rem;margin-top:8px;display:flex;align-items:center;gap:4px}
.sc-delta.up{color:var(--success)}
.sc-delta.down{color:var(--danger)}

/* CARD */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:24px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.card-header h2{font-size:1.05rem;color:var(--dark);font-weight:700;display:flex;align-items:center;gap:8px}
.card-header h2 i{color:var(--primary)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table.dtbl{width:100%;border-collapse:collapse}
table.dtbl th{background:#faf8ff;padding:12px 14px;text-align:right;font-size:.8rem;color:var(--muted);font-weight:600;border-bottom:2px solid var(--border)}
table.dtbl td{padding:13px 14px;border-bottom:1px solid #f3f0ff;color:var(--dark);font-size:.88rem;vertical-align:middle}
table.dtbl tr:hover td{background:#faf8ff}
table.dtbl tr:last-child td{border-bottom:none}
.badge{padding:4px 11px;border-radius:20px;font-size:.76rem;font-weight:600;display:inline-block}
.b-waiting{background:#fef3c7;color:#92400e}
.b-in_progress{background:#dbeafe;color:#1e40af}
.b-completed{background:#d1fae5;color:#065f46}
.b-paid{background:#dcfce7;color:#166534}

/* CHARTS GRID */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.chart-card h3{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.chart-card h3 i{color:var(--primary)}
.chart-wrap{position:relative;height:220px}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;background:var(--card);padding:16px 20px;border-radius:var(--radius);box-shadow:var(--shadow)}
.filter-bar select,.filter-bar input{
  padding:9px 14px;border:2px solid var(--border);border-radius:10px;
  font-family:inherit;font-size:.88rem;transition:all .2s;
}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--primary)}
.search-box{position:relative}
.search-box input{padding:9px 38px 9px 14px;width:250px}
.search-box i{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:20px}
.modal{background:var(--card);border-radius:20px;padding:32px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.3);animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-header h2{font-size:1.15rem;color:var(--dark);font-weight:700}
.close-btn{background:none;border:none;font-size:1.4rem;color:var(--muted);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:#fee2e2;color:var(--danger)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:7px;font-weight:600;font-size:.85rem;color:var(--mid)}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;transition:all .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,.1)}

/* TOAST */
#toasts{position:fixed;top:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#fff;padding:14px 18px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;min-width:280px;font-size:.9rem;animation:slideUp .3s ease;border-right:4px solid var(--primary)}
.toast.t-success{border-color:var(--success)}.toast.t-error{border-color:var(--danger)}.toast.t-warning{border-color:var(--warning)}
.toast.t-success i{color:var(--success)}.toast.t-error i{color:var(--danger)}.toast.t-warning i{color:var(--warning)}

/* UTILS */
.flex{display:flex;align-items:center;gap:10px}
.divider{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--muted);font-size:.85rem}
.text-success{color:var(--success);font-weight:700}
.fw-bold{font-weight:700}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state i{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.4}
.loading{text-align:center;padding:40px;color:var(--muted)}
.loading i{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.clinic-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.76rem;font-weight:600;background:var(--primary-light);color:var(--primary-dark)}
.age-pill{background:#d1fae5;color:#065f46;padding:4px 10px;border-radius:8px;font-weight:700;font-size:.8rem;display:inline-flex;align-items:center;gap:5px}
.section-title{font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title i{color:var(--primary)}
.tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:12px;width:fit-content;margin-bottom:20px}
.tab{padding:9px 20px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.87rem;color:var(--muted);border:none;background:none;font-family:inherit;transition:all .2s}
.tab.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
.tab-content{display:none}.tab-content.active{display:block}
.fin-card{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:20px;border-radius:var(--radius);text-align:center}
.fin-card h4{font-size:.85rem;opacity:.85;margin-bottom:10px}
.fin-card .amount{font-size:1.5rem;font-weight:800}

@media(max-width:1200px){.stats-grid{grid-template-columns:1fr 1fr}.charts-grid{grid-template-columns:1fr}}
@media(max-width:900px){#app{grid-template-columns:1fr}.sidebar{display:none}.main{margin-right:0}}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-wrap"><i class="fas fa-shield-alt"></i></div>
      <h1>لوحة المدير</h1>
      <p>عيادات الشفاء الطبية</p>
    </div>
    <div class="login-badge"><i class="fas fa-lock"></i> وصول المدير فقط</div>
    <div class="form-group">
      <label><i class="fas fa-user"></i> اسم المستخدم</label>
      <input type="text" id="lgUser" placeholder="admin">
    </div>
    <div class="form-group">
      <label><i class="fas fa-key"></i> كلمة المرور</label>
      <input type="password" id="lgPass" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
    <div id="lgError" class="hidden" style="margin-top:14px;background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;font-size:.88rem;text-align:center"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="s-icon"><i class="fas fa-chart-network"></i></div>
      <h2>عيادات الشفاء</h2>
      <div class="role">لوحة المدير</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">التحليلات</div>
      <div class="nav-item active" onclick="goTo('overview')"><i class="fas fa-chart-pie"></i><span>نظرة عامة</span></div>
      <div class="nav-item" onclick="goTo('reports')"><i class="fas fa-file-chart-line"></i><span>التقارير المالية</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label">البيانات</div>
      <div class="nav-item" onclick="goTo('patients')"><i class="fas fa-users"></i><span>جميع المرضى</span></div>
      <div class="nav-item" onclick="goTo('payments')"><i class="fas fa-receipt"></i><span>الدفعات</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label">الإدارة</div>
      <div class="nav-item" onclick="goTo('audit')"><i class="fas fa-shield-alt"></i><span>سجل المراقبة</span></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="av" id="sideAv">A</div>
        <div class="uc-info">
          <div class="uc-name" id="sideName">-</div>
          <div class="uc-role">مدير النظام</div>
        </div>
      </div>
      <button class="btn btn-outline" style="width:100%;font-size:.85rem;color:#94a3b8;border-color:#334155" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </div>

  <div class="main">
    <div class="top-bar">
      <h1 id="pageTitle">نظرة عامة</h1>
      <div class="tb-right">
        <div class="admin-badge"><i class="fas fa-crown"></i> مدير النظام</div>
        <div style="background:#ede9fe;color:var(--primary);padding:8px 14px;border-radius:10px;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:6px">
          <i class="fas fa-calendar"></i><span id="dateEl">-</span>
        </div>
      </div>
    </div>
    <div id="view"></div>
  </div>
</div>

<div id="modalRoot"></div>

<script>
/* ══════════════════════════════
   CONFIG
══════════════════════════════ */
const SB_URL = 'https://hejwbtrutjhbevdvfbyw.supabase.co'; // ← غيّر هذا
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlandidHJ1dGpoYmV2ZHZmYnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTQyMDIsImV4cCI6MjA5NjQzMDIwMn0.1GJRBu0Trs3mZqy564KrZbJtEh1afqWYRrWlxLoxERU';                     // ← غيّر هذا

const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);
let currentUser = null, currentView = 'overview';
let allPatients = [], allPayments = [], allUsers = [];

/* ══════════════════════════════
   CRYPTO
══════════════════════════════ */
async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({ name:'PBKDF2', salt:enc.encode(salt), iterations:100000, hash:'SHA-256' }, key, 256);
  return btoa(String.fromCharCode(...new Uint8Array(bits)));
}
function randomSalt() {
  const a = new Uint8Array(16); crypto.getRandomValues(a); return btoa(String.fromCharCode(...a));
}

/* ══════════════════════════════
   AUTH
══════════════════════════════ */
async function doLogin() {
  const u = document.getElementById('lgUser').value.trim();
  const p = document.getElementById('lgPass').value;
  if (!u || !p) return showLoginErr('أدخل البيانات');
  const { data:users } = await db.from('users').select('*').eq('username', u).eq('role','admin').eq('is_active',true).limit(1);
  if (!users?.length) return showLoginErr('المستخدم غير موجود أو ليس مديراً');
  const user = users[0];
  if (user.password_hash === 'PLACEHOLDER_HASH') {
    const salt = randomSalt(), hash = await hashPassword(p, salt);
    await db.from('users').update({password_hash:hash,password_salt:salt}).eq('id',user.id);
    user.password_hash = hash; user.password_salt = salt;
  }
  const hash = await hashPassword(p, user.password_salt);
  if (hash !== user.password_hash) return showLoginErr('كلمة المرور غير صحيحة');
  await db.from('users').update({last_login:new Date().toISOString()}).eq('id',user.id);
  currentUser = user;
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sideName').textContent = user.full_name;
  document.getElementById('sideAv').textContent = user.full_name.charAt(0);
  document.getElementById('dateEl').textContent = new Date().toLocaleDateString('ar-JO',{day:'numeric',month:'long',year:'numeric'});
  goTo('overview');
}
function showLoginErr(m) {
  const e = document.getElementById('lgError'); e.textContent = m; e.classList.remove('hidden');
}
function doLogout() {
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('lgPass').value = '';
  document.getElementById('lgError').classList.add('hidden');
}
document.addEventListener('keydown', e => { if (e.key === 'Enter' && !document.getElementById('loginPage').classList.contains('hidden')) doLogin(); });

/* ══════════════════════════════
   NAV
══════════════════════════════ */
function goTo(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[onclick="goTo('${v}')"]`)?.classList.add('active');
  const titles = {overview:'نظرة عامة',reports:'التقارير المالية',patients:'المرضى',payments:'الدفعات',audit:'سجل المراقبة'};
  document.getElementById('pageTitle').textContent = titles[v] || v;
  ({overview:viewOverview,reports:viewReports,patients:viewPatients,payments:viewPayments,audit:viewAudit}[v]||(() => {}))();
}

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
function fmt(d){return d?new Date(d).toLocaleDateString('ar-JO'):'-'}
function fmtT(d){return d?new Date(d).toLocaleTimeString('ar-JO',{hour:'2-digit',minute:'2-digit'}):'-'}
function fmtCur(n){return new Intl.NumberFormat('ar-JO',{style:'currency',currency:'JOD'}).format(n||0)}
function calcAge(bd){if(!bd)return null;const t=new Date(),b=new Date(bd);let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a}
function fmtAge(bd){const a=calcAge(bd);return a===null?'-':a+' سنة'}
function clinicName(id){return{dental:'الأسنان',cosmetic:'التجميل',derma:'الجلدية',general:'العامة',ent:'أنف وأذن',all:'عامة'}[id]||id}
function statusBadge(s){const m={waiting:['b-waiting','انتظار'],in_progress:['b-in_progress','علاج'],completed:['b-completed','مكتمل'],paid:['b-paid','مدفوع']};const[c,l]=m[s]||['b-waiting',s];return`<span class="badge ${c}">${l}</span>`}
function pmName(m){return{cash:'نقدي',visa:'Visa',mastercard:'Mastercard',mada:'مدى',apple:'Apple Pay',bank:'تحويل',cliq:'CliQ'}[m]||m}
function showToast(msg,type='success'){const c=document.getElementById('toasts');const t=document.createElement('div');const i=type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-exclamation-circle';t.className=`toast t-${type}`;t.innerHTML=`<i class="fas ${i}"></i><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>t.remove(),3500)}
function openModal(html){document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function setLoading(){document.getElementById('view').innerHTML=`<div class="loading"><i class="fas fa-spinner"></i><p style="margin-top:10px">جاري التحميل...</p></div>`}

/* ══════════════════════════════
   LOAD DATA
══════════════════════════════ */
async function loadAll() {
  const [{ data: pts }, { data: pays }, { data: users }] = await Promise.all([
    db.from('patients').select('*').order('created_at', { ascending: false }),
    db.from('payments').select('*').order('payment_date', { ascending: false }),
    db.from('users').select('*').order('created_at')
  ]);
  allPatients = pts || [];
  allPayments = pays || [];
  allUsers = users || [];
}

/* ══════════════════════════════
   OVERVIEW
══════════════════════════════ */
async function viewOverview() {
  setLoading();
  await loadAll();

  const today = new Date().toISOString().slice(0,10);
  const todayPays = allPayments.filter(p => p.payment_date?.slice(0,10) === today);
  const todayRev  = todayPays.reduce((s,p)=>s+Number(p.amount),0);
  const totalRev  = allPayments.reduce((s,p)=>s+Number(p.amount),0);
  const monthAgo  = new Date(Date.now()-30*864e5).toISOString();
  const monthPays = allPayments.filter(p=>p.payment_date>=monthAgo);
  const monthRev  = monthPays.reduce((s,p)=>s+Number(p.amount),0);
  const waiting   = allPatients.filter(p=>p.status==='waiting').length;

  // Clinic revenue
  const clinicRev = {};
  allPayments.forEach(pay => {
    const pt = allPatients.find(p=>p.id===pay.patient_id);
    if (pt) clinicRev[pt.clinic_id] = (clinicRev[pt.clinic_id]||0)+Number(pay.amount);
  });

  // Daily revenue last 7 days
  const days7 = [];
  for (let i=6;i>=0;i--) {
    const d = new Date(Date.now()-i*864e5);
    const ds = d.toISOString().slice(0,10);
    const label = d.toLocaleDateString('ar-JO',{weekday:'short'});
    const rev = allPayments.filter(p=>p.payment_date?.slice(0,10)===ds).reduce((s,p)=>s+Number(p.amount),0);
    days7.push({label,rev});
  }

  // Payment method breakdown
  const pmBreak = {};
  allPayments.forEach(p=>{ pmBreak[p.payment_method]=(pmBreak[p.payment_method]||0)+Number(p.amount); });

  document.getElementById('view').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card sc-purple">
        <div class="sc-icon"><i class="fas fa-users"></i></div>
        <div class="sc-val">${allPatients.length}</div>
        <div class="sc-label">إجمالي المرضى</div>
      </div>
      <div class="stat-card sc-orange">
        <div class="sc-icon"><i class="fas fa-clock"></i></div>
        <div class="sc-val">${waiting}</div>
        <div class="sc-label">في الانتظار الآن</div>
      </div>
      <div class="stat-card sc-green">
        <div class="sc-icon"><i class="fas fa-calendar-day"></i></div>
        <div class="sc-val">${fmtCur(todayRev).replace('دينار أردني','JD')}</div>
        <div class="sc-label">إيرادات اليوم</div>
        <div class="sc-delta up"><i class="fas fa-arrow-up"></i>${todayPays.length} معاملة</div>
      </div>
      <div class="stat-card sc-green">
        <div class="sc-icon"><i class="fas fa-wallet"></i></div>
        <div class="sc-val" style="font-size:1.3rem">${fmtCur(totalRev)}</div>
        <div class="sc-label">إجمالي الإيرادات</div>
        <div class="sc-delta up"><i class="fas fa-chart-line"></i>${allPayments.length} دفعة</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3><i class="fas fa-chart-bar"></i> إيرادات آخر 7 أيام</h3>
        <div class="chart-wrap"><canvas id="chartDays"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><i class="fas fa-chart-pie"></i> توزيع طرق الدفع</h3>
        <div class="chart-wrap"><canvas id="chartPM"></canvas></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <div class="card">
        <div class="card-header"><h2><i class="fas fa-hospital"></i> الإيرادات حسب العيادة</h2></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${['dental','cosmetic','derma','general','ent'].map(id=>`
            <div class="fin-card" style="padding:16px">
              <h4>${clinicName(id)}</h4>
              <div class="amount" style="font-size:1.1rem">${fmtCur(clinicRev[id]||0)}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2><i class="fas fa-user-clock"></i> آخر 5 دفعات</h2></div>
        <table class="dtbl">
          <thead><tr><th>المريض</th><th>الخدمة</th><th>المبلغ</th></tr></thead>
          <tbody>
            ${allPayments.slice(0,5).map(p=>{
              const pt=allPatients.find(x=>x.id===p.patient_id);
              return `<tr><td><b>${pt?.name||'—'}</b></td><td style="font-size:.82rem">${p.procedure_name}</td><td class="text-success">${fmtCur(p.amount)}</td></tr>`;
            }).join('')||'<tr><td colspan="3" class="text-muted" style="text-align:center;padding:20px">لا توجد بيانات</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;

  // Draw charts
  new Chart(document.getElementById('chartDays'), {
    type:'bar',
    data:{
      labels:days7.map(d=>d.label),
      datasets:[{label:'الإيرادات (دينار)',data:days7.map(d=>d.rev),backgroundColor:'rgba(124,58,237,.7)',borderRadius:8,borderSkipped:false}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
  });

  const pmColors=['#10b981','#1d4ed8','#ef4444','#06b6d4','#111827','#f59e0b','#8b5cf6'];
  const pmLabels=Object.keys(pmBreak).map(pmName);
  const pmVals=Object.values(pmBreak);
  if (pmLabels.length) {
    new Chart(document.getElementById('chartPM'), {
      type:'doughnut',
      data:{labels:pmLabels,datasets:[{data:pmVals,backgroundColor:pmColors,borderWidth:3,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:10}}}}
    });
  }
}

/* ══════════════════════════════
   REPORTS
══════════════════════════════ */
async function viewReports() {
  setLoading();
  if (!allPayments.length) await loadAll();

  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const week = new Date(Date.now()-7*864e5).toISOString();
  const month = new Date(now.getFullYear(),now.getMonth(),1).toISOString();

  const todayRev = allPayments.filter(p=>p.payment_date?.slice(0,10)===todayStr).reduce((s,p)=>s+Number(p.amount),0);
  const weekRev  = allPayments.filter(p=>p.payment_date>=week).reduce((s,p)=>s+Number(p.amount),0);
  const monthRev = allPayments.filter(p=>p.payment_date>=month).reduce((s,p)=>s+Number(p.amount),0);
  const totalRev = allPayments.reduce((s,p)=>s+Number(p.amount),0);

  // Top services
  const svcMap = {};
  allPayments.forEach(p=>{
    if(!svcMap[p.procedure_name])svcMap[p.procedure_name]={count:0,total:0};
    svcMap[p.procedure_name].count++;
    svcMap[p.procedure_name].total+=Number(p.amount);
  });
  const topSvcs = Object.entries(svcMap).sort((a,b)=>b[1].total-a[1].total).slice(0,10);

  document.getElementById('view').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card sc-green"><div class="sc-icon"><i class="fas fa-calendar-day"></i></div><div class="sc-val" style="font-size:1.2rem">${fmtCur(todayRev)}</div><div class="sc-label">اليوم</div></div>
      <div class="stat-card sc-purple"><div class="sc-icon"><i class="fas fa-calendar-week"></i></div><div class="sc-val" style="font-size:1.2rem">${fmtCur(weekRev)}</div><div class="sc-label">هذا الأسبوع</div></div>
      <div class="stat-card sc-orange"><div class="sc-icon"><i class="fas fa-calendar-alt"></i></div><div class="sc-val" style="font-size:1.2rem">${fmtCur(monthRev)}</div><div class="sc-label">هذا الشهر</div></div>
      <div class="stat-card sc-green"><div class="sc-icon"><i class="fas fa-wallet"></i></div><div class="sc-val" style="font-size:1.1rem">${fmtCur(totalRev)}</div><div class="sc-label">الإجمالي الكلي</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-trophy"></i> أفضل الخدمات إيراداً</h2>
      </div>
      <table class="dtbl">
        <thead><tr><th>#</th><th>الخدمة</th><th>عدد المرات</th><th>الإجمالي</th></tr></thead>
        <tbody>
          ${topSvcs.map(([svc,d],i)=>`
            <tr>
              <td><span style="background:var(--primary-light);color:var(--primary);padding:3px 9px;border-radius:8px;font-weight:700">${i+1}</span></td>
              <td class="fw-bold">${svc}</td>
              <td>${d.count}</td>
              <td class="text-success">${fmtCur(d.total)}</td>
            </tr>
          `).join('')||'<tr><td colspan="4" class="text-muted" style="text-align:center;padding:30px">لا توجد بيانات</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

/* ══════════════════════════════
   PATIENTS
══════════════════════════════ */
async function viewPatients() {
  setLoading();
  const { data } = await db.from('patients').select('*').order('created_at',{ascending:false});
  allPatients = data || [];
  renderPatientsView();
}

function renderPatientsView(list) {
  list = list || allPatients;
  document.getElementById('view').innerHTML = `
    <div class="filter-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input id="ptSrch" placeholder="بحث بالاسم، الهاتف، رقم الملف..." oninput="filterAdminPts()">
      </div>
      <select id="ptClinicF" onchange="filterAdminPts()">
        <option value="">كل العيادات</option>
        <option value="dental">الأسنان</option>
        <option value="cosmetic">التجميل</option>
        <option value="derma">الجلدية</option>
        <option value="general">العامة</option>
        <option value="ent">أنف وأذن</option>
      </select>
      <select id="ptStatusF" onchange="filterAdminPts()">
        <option value="">كل الحالات</option>
        <option value="waiting">انتظار</option>
        <option value="in_progress">علاج</option>
        <option value="completed">مكتمل</option>
        <option value="paid">مدفوع</option>
      </select>
      <span class="text-muted" id="ptCount">${list.length} مريض</span>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="dtbl">
          <thead><tr><th>#ملف</th><th>الاسم</th><th>الهاتف</th><th>العمر</th><th>العيادة</th><th>الحالة</th><th>التاريخ</th><th>بواسطة</th><th>إجراء</th></tr></thead>
          <tbody id="ptBody">${renderPtRows(list)}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderPtRows(list) {
  if(!list.length) return `<tr><td colspan="9"><div class="empty-state"><i class="fas fa-users"></i><p>لا يوجد مرضى</p></div></td></tr>`;
  return list.map(p=>`
    <tr>
      <td class="fw-bold">${p.file_number}</td>
      <td><b>${p.name}</b><br><span class="text-muted">${p.gender==='male'?'ذكر':'أنثى'}</span></td>
      <td dir="ltr">${p.phone}</td>
      <td><span class="age-pill">${fmtAge(p.birth_date)}</span></td>
      <td><span class="clinic-tag">${clinicName(p.clinic_id)}</span></td>
      <td>${statusBadge(p.status)}</td>
      <td>${fmt(p.created_at)}<br><span class="text-muted">${fmtT(p.created_at)}</span></td>
      <td class="text-muted" style="font-size:.8rem">${p.created_by||'-'}</td>
      <td>
        <button class="btn btn-xs btn-danger" onclick="adminDeletePt('${p.id}','${p.name.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function filterAdminPts() {
  const q = (document.getElementById('ptSrch')?.value||'').toLowerCase();
  const cl = document.getElementById('ptClinicF')?.value||'';
  const st = document.getElementById('ptStatusF')?.value||'';
  let filtered = allPatients.filter(p=>{
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.phone.includes(q) || String(p.file_number).includes(q);
    const matchC = !cl || p.clinic_id===cl;
    const matchS = !st || p.status===st;
    return matchQ && matchC && matchS;
  });
  document.getElementById('ptBody').innerHTML = renderPtRows(filtered);
  document.getElementById('ptCount').textContent = filtered.length + ' مريض';
}

async function adminDeletePt(id, name) {
  if (!confirm(`حذف المريض "${name}"؟`)) return;
  await db.from('patients').delete().eq('id',id);
  allPatients = allPatients.filter(p=>p.id!==id);
  showToast('تم حذف المريض','warning');
  filterAdminPts();
}

/* ══════════════════════════════
   PAYMENTS
══════════════════════════════ */
async function viewPayments() {
  setLoading();
  const { data } = await db.from('payments').select('*').order('payment_date',{ascending:false});
  allPayments = data || [];
  renderPaymentsView(allPayments);
}

function renderPaymentsView(list) {
  const total = list.reduce((s,p)=>s+Number(p.amount),0);
  document.getElementById('view').innerHTML = `
    <div class="filter-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input id="paySrch" placeholder="بحث..." oninput="filterAdminPays()">
      </div>
      <select id="payMethodF" onchange="filterAdminPays()">
        <option value="">كل طرق الدفع</option>
        <option value="cash">نقدي</option><option value="visa">Visa</option>
        <option value="mastercard">Mastercard</option><option value="mada">مدى</option>
        <option value="apple">Apple Pay</option><option value="bank">تحويل</option><option value="cliq">CliQ</option>
      </select>
      <span class="text-success fw-bold" id="payTotal">الإجمالي: ${fmtCur(total)}</span>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="dtbl">
          <thead><tr><th>#سند</th><th>المريض</th><th>الإجراء</th><th>المبلغ</th><th>طريقة الدفع</th><th>التاريخ والوقت</th><th>الموظف</th><th>إجراء</th></tr></thead>
          <tbody id="payBody">${renderPayRows(list)}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderPayRows(list) {
  if(!list.length) return `<tr><td colspan="8"><div class="empty-state"><i class="fas fa-receipt"></i><p>لا توجد دفعات</p></div></td></tr>`;
  return list.map(p=>{
    const pt = allPatients.find(x=>x.id===p.patient_id);
    return `
      <tr>
        <td class="fw-bold">#${p.receipt_number||p.id.slice(-4).toUpperCase()}</td>
        <td><b>${pt?.name||'—'}</b><br><span class="text-muted" style="font-size:.78rem">${pt?fmtAge(pt.birth_date):''}</span></td>
        <td style="font-size:.85rem">${p.procedure_name}</td>
        <td class="text-success fw-bold">${fmtCur(p.amount)}</td>
        <td><span class="badge" style="background:#ede9fe;color:var(--primary)">${pmName(p.payment_method)}</span></td>
        <td>${fmt(p.payment_date)}<br><span class="text-muted">${fmtT(p.payment_date)}</span></td>
        <td class="text-muted">${p.created_by||'-'}</td>
        <td><button class="btn btn-xs btn-danger" onclick="adminDeletePay('${p.id}')"><i class="fas fa-trash"></i></button></td>
      </tr>
    `;
  }).join('');
}

function filterAdminPays() {
  const q=(document.getElementById('paySrch')?.value||'').toLowerCase();
  const m=document.getElementById('payMethodF')?.value||'';
  let filtered=allPayments.filter(p=>{
    const pt=allPatients.find(x=>x.id===p.patient_id);
    const matchQ=!q||(pt?.name||'').toLowerCase().includes(q)||p.procedure_name.toLowerCase().includes(q);
    const matchM=!m||p.payment_method===m;
    return matchQ&&matchM;
  });
  document.getElementById('payBody').innerHTML=renderPayRows(filtered);
  const total=filtered.reduce((s,p)=>s+Number(p.amount),0);
  document.getElementById('payTotal').textContent='الإجمالي: '+fmtCur(total);
}

async function adminDeletePay(id) {
  if(!confirm('حذف هذه الدفعة؟'))return;
  await db.from('payments').delete().eq('id',id);
  allPayments=allPayments.filter(p=>p.id!==id);
  showToast('تم حذف الدفعة','warning');
  filterAdminPays();
}
