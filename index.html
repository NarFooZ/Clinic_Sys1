<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>الشفاء — لوحة الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --teal: #0D1B1E;
  --teal-dark: #091214;
  --teal-mid: #142A2E;
  --teal-light: #1F8A8A;
  --teal-soft: #2A6B7C;
  --gold: #C8A45C;
  --gold-light: #E0C080;
  --gold-dark: #A8853E;
  --amber: #D4952E;
  --rose: #DC5858;
  --rose-light: #E87A7A;
  --forest: #3A8C5F;
  --cream: #C4BAA8;
  --cream-dark: #9E9280;
  --bg: #091214;
  --card: #0D1B1E;
  --card-hover: #142A2E;
  --border: rgba(200,164,92,.12);
  --text: #E8E0D0;
  --text-muted: #9E9280;
  --sidebar-w: 250px;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{
  font-family:"Cairo","Tahoma",sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold-light)}
.hidden{display:none!important}
.text-muted{color:var(--text-muted)}
.text-success{color:var(--gold)}
.fw-bold{font-weight:700}

/* SIDEBAR */
.sidebar{
  position:fixed;top:0;right:0;bottom:0;width:var(--sidebar-w);
  background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:1000;
  box-shadow:0 0 40px rgba(0,0,0,.3);
}
.sidebar-brand{
  padding:24px 20px 20px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.sidebar-brand h1{
  font-size:1.3rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold-light),var(--amber));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sidebar-brand p{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.sidebar-user{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border)}
.su-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--teal-soft),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0}
.su-info{flex:1;min-width:0}
.su-info .name{font-weight:700;font-size:.9rem}
.su-info .role{font-size:.75rem;color:var(--text-muted)}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-item{
  display:flex;align-items:center;gap:14px;padding:12px 20px;
  color:var(--text-muted);cursor:pointer;transition:all .2s;
  border-right:3px solid transparent;
}
.nav-item i{width:20px;text-align:center;font-size:1rem}
.nav-item:hover{background:rgba(200,164,92,.06);color:var(--text)}
.nav-item.active{color:var(--gold);background:rgba(200,164,92,.1);border-right-color:var(--gold)}
.nav-item .badge{background:var(--rose);color:#fff;font-size:.65rem;padding:1px 7px;border-radius:10px;margin-right:auto}

/* MAIN */
.main{position:relative;margin-right:var(--sidebar-w);min-height:100vh}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid var(--border);
  background:var(--card);
}
.topbar h2{font-size:1.2rem;font-weight:700}
.topbar .date{font-size:.8rem;color:var(--text-muted)}
.topbar .t-left{display:flex;align-items:center;gap:16px}
.logout-btn{
  background:rgba(220,88,88,.15);color:var(--rose);border:none;
  padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.82rem;
  font-family:"Cairo",sans-serif;transition:all .2s;
}
.logout-btn:hover{background:rgba(220,88,88,.25)}
#view{padding:24px 28px}

/* CARDS */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:20px;
  box-shadow:var(--shadow);
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border);
}
.card-header h2{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:10px}
.card-header h2 i{color:var(--gold);font-size:.9rem}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);transition:all .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,.5)}
.sc-icon{position:absolute;left:18px;top:18px;font-size:2.2rem;opacity:.1;color:var(--cream)}
.sc-val{font-size:1.8rem;font-weight:900;margin-bottom:4px}
.sc-label{font-size:.8rem;color:var(--text-muted)}
.sc-delta{font-size:.72rem;margin-top:8px;display:flex;align-items:center;gap:4px}
.sc-delta.up{color:var(--forest)}
.sc-delta.down{color:var(--rose)}
.sc-purple .sc-val{color:var(--teal-light)}
.sc-orange .sc-val{color:var(--amber)}
.sc-green .sc-val{color:var(--gold)}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
}
.chart-card h3{font-size:.95rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.chart-card h3 i{color:var(--gold)}
.chart-wrap{position:relative;height:220px}
canvas{max-width:100%!important}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.dtbl{width:100%;border-collapse:collapse;font-size:.85rem}
.dtbl thead{background:rgba(42,107,124,.12)}
.dtbl th{padding:12px 14px;text-align:right;font-weight:700;color:var(--gold-light);font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
.dtbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.dtbl tr:hover{background:rgba(200,164,92,.03)}
.dtbl .age-pill{background:rgba(42,107,124,.15);color:var(--teal-light);padding:2px 10px;border-radius:20px;font-size:.78rem}
.dtbl .clinic-tag{background:rgba(200,164,92,.1);color:var(--gold);padding:2px 10px;border-radius:8px;font-size:.78rem;font-weight:600}

/* BADGE */
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:700}
.b-waiting{background:rgba(212,149,46,.15);color:var(--amber)}
.b-in_progress{background:rgba(31,138,138,.15);color:var(--teal-light)}
.b-completed{background:rgba(58,140,95,.15);color:var(--forest)}
.b-paid{background:rgba(200,164,92,.15);color:var(--gold)}

/* FILTER */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:6px 14px;flex:1;min-width:200px;
}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-family:"Cairo",sans-serif;width:100%;font-size:.85rem}
.search-box input::placeholder{color:var(--text-muted)}
.search-box i{color:var(--text-muted)}
select{
  background:var(--card);color:var(--text);border:1px solid var(--border);
  padding:8px 16px;border-radius:10px;font-family:"Cairo",sans-serif;
  font-size:.82rem;outline:none;cursor:pointer;
}
select:focus{border-color:var(--gold)}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:"Cairo",sans-serif;border-radius:8px;transition:all .2s;font-size:.85rem;padding:8px 18px}
.btn-xs{padding:4px 10px;font-size:.75rem}
.btn-danger{background:rgba(220,88,88,.15);color:var(--rose)}
.btn-danger:hover{background:rgba(220,88,88,.25)}
.btn-gold{background:var(--gold);color:var(--teal);font-weight:700}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 16px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* TOASTS */
#toasts{position:fixed;bottom:24px;left:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 20px;box-shadow:0 10px 40px rgba(0,0,0,.5);
  animation:si .35s ease-out;font-size:.85rem;min-width:260px;
}
@keyframes si{0%{opacity:0;transform:translateX(40px)}100%{opacity:1;transform:translateX(0)}}
.t-success{border-right:4px solid var(--forest)}
.t-success i{color:var(--forest)}
.t-error{border-right:4px solid var(--rose)}
.t-error i{color:var(--rose)}
.t-warning{border-right:4px solid var(--amber)}
.t-warning i{color:var(--amber)}

/* EMPTY */
.empty-state{text-align:center;padding:40px;color:var(--text-muted)}
.empty-state i{font-size:3rem;display:block;margin-bottom:14px;opacity:.4}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:30px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h3{font-size:1.1rem;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.modal h3 i{color:var(--gold)}

/* LOADING */
.loading{text-align:center;padding:80px 20px;color:var(--text-muted)}
.loading i{font-size:2.5rem;animation:spin .8s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

/* FINANCIAL CARDS */
.fin-card{background:rgba(42,107,124,.08);border:1px solid var(--border);border-radius:12px;text-align:center;padding:12px}
.fin-card h4{font-size:.8rem;color:var(--text-muted);margin-bottom:4px}
.fin-card .amount{font-weight:700;color:var(--gold);font-size:1.2rem}

/* LOGIN PAGE */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:40px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-box h1{font-size:1.5rem;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--gold-light),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.login-box .sub{text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:28px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:var(--cream)}
.fg input{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:11px 16px;color:var(--text);font-family:"Cairo",sans-serif;
  font-size:.9rem;outline:none;transition:all .2s;
}
.fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,164,92,.1)}
.login-btn{
  width:100%;background:var(--gold);color:var(--teal);border:none;
  padding:12px;border-radius:10px;font-size:1rem;font-weight:700;
  font-family:"Cairo",sans-serif;cursor:pointer;transition:all .2s;margin-top:6px;
}
.login-btn:hover{background:var(--gold-light)}
.login-error{background:rgba(220,88,88,.12);color:var(--rose);padding:10px 14px;border-radius:10px;font-size:.82rem;margin-bottom:16px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--cream-dark)}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="modalRoot"></div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>عيادات الشفاء</h1>
    <p class="sub">لوحة الإدارة</p>
    <div id="lgError" class="login-error hidden"></div>
    <div class="fg"><label><i class="fas fa-user" style="margin-left:6px;color:var(--gold)"></i> اسم المستخدم</label><input id="lgUser" placeholder="أدخل اسم المستخدم"></div>
    <div class="fg"><label><i class="fas fa-lock" style="margin-left:6px;color:var(--gold)"></i> كلمة المرور</label><input id="lgPass" type="password" placeholder="أدخل كلمة المرور"></div>
    <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt" style="margin-left:8px"></i> دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>الشفاء</h1>
      <p>Al-Shifa Clinics</p>
    </div>
    <div class="sidebar-user">
      <div class="su-av" id="sideAv">أ</div>
      <div class="su-info">
        <div class="name" id="sideName">المدير</div>
        <div class="role"><i class="fas fa-crown" style="color:var(--gold);font-size:.65rem;margin-left:3px"></i> مدير النظام</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="goTo('overview')"><i class="fas fa-chart-pie"></i> نظرة عامة</div>
      <div class="nav-item" onclick="goTo('reports')"><i class="fas fa-file-invoice-dollar"></i> التقارير المالية</div>
      <div class="nav-item" onclick="goTo('patients')"><i class="fas fa-users"></i> المرضى</div>
      <div class="nav-item" onclick="goTo('payments')"><i class="fas fa-receipt"></i> الدفعات</div>
      <div class="nav-item" onclick="goTo('audit')"><i class="fas fa-shield-alt"></i> سجل المراقبة</div>
    </nav>
    <div style="padding:14px;border-top:1px solid var(--border);text-align:center">
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt" style="margin-left:5px"></i> تسجيل خروج</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">نظرة عامة</h2>
      <div class="t-left">
        <span class="date" id="dateEl"></span>
      </div>
    </div>
    <div id="view"></div>
  </div>
</div><script>
/* CONFIG */
const SB_URL = "https://hejwbtrutjhbevdvfbyw.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlandidHJ1dGpoYmV2ZHZmYnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTQyMDIsImV4cCI6MjA5NjQzMDIwMn0.1GJRBu0Trs3mZqy564KrZbJtEh1afqWYRrWlxLoxERU";
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);
let currentUser = null, currentView = "overview";
let allPatients = [], allPayments = [], allUsers = [];

/* CRYPTO */
async function hashPassword(pwd, salt) {
  var enc = new TextEncoder();
  var key = await crypto.subtle.importKey("raw", enc.encode(pwd), "PBKDF2", false, ["deriveBits"]);
  var bits = await crypto.subtle.deriveBits({name:"PBKDF2", salt:enc.encode(salt), iterations:100000, hash:"SHA-256"}, key, 256);
  return btoa(String.fromCharCode.apply(null, new Uint8Array(bits)));
}
function randomSalt() {
  var a = new Uint8Array(16); crypto.getRandomValues(a); return btoa(String.fromCharCode.apply(null, a));
}

/* AUTH */
async function doLogin() {
  var u = document.getElementById("lgUser").value.trim();
  var p = document.getElementById("lgPass").value;
  if (!u || !p) return showLoginErr("أدخل البيانات");
  var { data:users } = await db.from("users").select("*").eq("username", u).eq("role","admin").eq("is_active",true).limit(1);
  if (!users?.length) return showLoginErr("المستخدم غير موجود أو ليس مديراً");
  var user = users[0];
  if (user.password_hash === "PLACEHOLDER_HASH") {
    var salt = randomSalt(), hash = await hashPassword(p, salt);
    await db.from("users").update({password_hash:hash,password_salt:salt}).eq("id",user.id);
    user.password_hash = hash; user.password_salt = salt;
  }
  hash = await hashPassword(p, user.password_salt);
  if (hash !== user.password_hash) return showLoginErr("كلمة المرور غير صحيحة");
  await db.from("users").update({last_login:new Date().toISOString()}).eq("id",user.id);
  currentUser = user;
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("sideName").textContent = user.full_name;
  document.getElementById("sideAv").textContent = user.full_name.charAt(0);
  document.getElementById("dateEl").textContent = new Date().toLocaleDateString("ar-JO",{day:"numeric",month:"long",year:"numeric"});
  goTo("overview");
}
function showLoginErr(m) {
  var e = document.getElementById("lgError"); e.textContent = m; e.classList.remove("hidden");
}
function doLogout() {
  currentUser = null;
  document.getElementById("app").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("lgPass").value = "";
  document.getElementById("lgError").classList.add("hidden");
}
document.addEventListener("keydown", function(e){
  if (e.key === "Enter" && !document.getElementById("loginPage").classList.contains("hidden")) doLogin();
});

/* NAV */
function goTo(v) {
  currentView = v;
  var items = document.querySelectorAll(".nav-item");
  for (var i = 0; i < items.length; i++) items[i].classList.remove("active");
  var sel = document.querySelector("[onclick*=\"'"+v+"'\"]");
  if (sel) sel.classList.add("active");
  var titles = {overview:"نظرة عامة", reports:"التقارير المالية", patients:"المرضى", payments:"الدفعات", audit:"سجل المراقبة"};
  document.getElementById("pageTitle").textContent = titles[v] || v;
  var fn = {overview:viewOverview, reports:viewReports, patients:viewPatients, payments:viewPayments, audit:viewAudit}[v] || function(){};
  fn();
}

/* UTILS */
function fmt(d){return d?new Date(d).toLocaleDateString("ar-JO"):"-"}
function fmtT(d){return d?new Date(d).toLocaleTimeString("ar-JO",{hour:"2-digit",minute:"2-digit"}):"-"}
function fmtCur(n){return new Intl.NumberFormat("ar-JO",{style:"currency",currency:"JOD"}).format(n||0)}
function calcAge(bd){if(!bd)return null;var t=new Date(),b=new Date(bd);var a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a}
function fmtAge(bd){var a=calcAge(bd);return a===null?"-":a+" سنة"}
function clinicName(id){return{dental:"الأسنان",cosmetic:"التجميل",derma:"الجلدية",general:"العامة",ent:"أنف وأذن",all:"عامة"}[id]||id}
function statusBadge(s){var m={waiting:["b-waiting","انتظار"],in_progress:["b-in_progress","علاج"],completed:["b-completed","مكتمل"],paid:["b-paid","مدفوع"]};var c=m[s]?m[s][0]:"b-waiting";var l=m[s]?m[s][1]:s;return "<span class=\"badge "+c+"\">"+l+"</span>"}
function pmName(m){return{cash:"نقدي",visa:"Visa",mastercard:"Mastercard",mada:"مدى",apple:"Apple Pay",bank:"تحويل",cliq:"CliQ"}[m]||m}
function showToast(msg,type){type=type||"success";var c=document.getElementById("toasts");var t=document.createElement("div");var i=(type==="success"?"fa-check-circle":type==="error"?"fa-times-circle":"fa-exclamation-circle");t.className="toast t-"+type;t.innerHTML="<i class=\"fas "+i+"\"></i><span>"+msg+"</span>";c.appendChild(t);setTimeout(function(){t.remove()},3500)}
function openModal(html){document.getElementById("modalRoot").innerHTML="<div class=\"overlay\" onclick=\"if(event.target===this)closeModal()\"><div class=\"modal\">"+html+"</div></div>"}
function closeModal(){document.getElementById("modalRoot").innerHTML=""}
function setLoading(){document.getElementById("view").innerHTML="<div class=\"loading\"><i class=\"fas fa-spinner\"></i><p style=\"margin-top:10px\">جاري التحميل...</p></div>"}
/* LOAD DATA */
async function loadAll() {
  var [{data:pts},{data:pays},{data:users}] = await Promise.all([
    db.from("patients").select("*").order("created_at",{ascending:false}),
    db.from("payments").select("*").order("payment_date",{ascending:false}),
    db.from("users").select("*").order("created_at")
  ]);
  allPatients = pts||[];
  allPayments = pays||[];
  allUsers = users||[];
}

/* OVERVIEW */
async function viewOverview() {
  setLoading();
  await loadAll();

  var todayRev = todayPays.reduce(function(s,p){return s+Number(p.amount)},0);
  var totalRev = allPayments.reduce(function(s,p){return s+Number(p.amount)},0);

  var clinicHtml = "";
  ["dental","cosmetic","derma","general","ent"].forEach(function(id){
    clinicHtml += "<div class=\"fin-card\" style=\"padding:16px\"><h4>"+clinicName(id)+"</h4><div class=\"amount\" style=\"font-size:1.1rem\">"+fmtCur(clinicRev[id]||0)+"</div></div>";
  });
  
  var paysHtml = "";
  if(allPayments.length){
    allPayments.slice(0,5).forEach(function(p){
      var pt = allPatients.find(function(x){return x.id===p.patient_id});
      paysHtml += "<tr><td><b>"+(pt?.name||"&#8212;")+"</b></td><td style=\"font-size:.82rem\">"+p.procedure_name+"</td><td class=\"text-success\">"+fmtCur(p.amount)+"</td></tr>";
    });
  } else {
    paysHtml = "<tr><td colspan=\"3\" class=\"text-muted\" style=\"text-align:center;padding:20px\">لا توجد بيانات</td></tr>";
  }
  
  document.getElementById("view").innerHTML = 
    "<div class=\"stats-grid\">"+
      "<div class=\"stat-card sc-purple\"><div class=\"sc-icon\"><i class=\"fas fa-users\"></i></div><div class=\"sc-val\">"+allPatients.length+"</div><div class=\"sc-label\">إجمالي المرضى</div></div>"+
      "<div class=\"stat-card sc-orange\"><div class=\"sc-icon\"><i class=\"fas fa-clock\"></i></div><div class=\"sc-val\">"+waiting+"</div><div class=\"sc-label\">في الانتظار الآن</div></div>"+
      "<div class=\"stat-card sc-green\"><div class=\"sc-icon\"><i class=\"fas fa-calendar-day\"></i></div><div class=\"sc-val\">"+fmtCur(todayRev).replace("دينار أردني","JD")+"</div><div class=\"sc-label\">إيرادات اليوم</div><div class=\"sc-delta up\"><i class=\"fas fa-arrow-up\"></i> "+todayPays.length+" معاملة</div></div>"+
      "<div class=\"stat-card sc-green\"><div class=\"sc-icon\"><i class=\"fas fa-wallet\"></i></div><div class=\"sc-val\" style=\"font-size:1.3rem\">"+fmtCur(totalRev)+"</div><div class=\"sc-label\">إجمالي الإيرادات</div><div class=\"sc-delta up\"><i class=\"fas fa-chart-line\"></i> "+allPayments.length+" دفعة</div></div>"+
    "</div>"+
    "<div class=\"charts-grid\">"+
      "<div class=\"chart-card\"><h3><i class=\"fas fa-chart-bar\"></i> إيرادات آخر 7 أيام</h3><div class=\"chart-wrap\"><canvas id=\"chartDays\"></canvas></div></div>"+
      "<div class=\"chart-card\"><h3><i class=\"fas fa-chart-pie\"></i> توزيع طرق الدفع</h3><div class=\"chart-wrap\"><canvas id=\"chartPM\"></canvas></div></div>"+
    "</div>"+
    "<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px\">"+
      "<div class=\"card\"><div class=\"card-header\"><h2><i class=\"fas fa-hospital\"></i> الإيرادات حسب العيادة</h2></div><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">"+clinicHtml+"</div></div>"+
      "<div class=\"card\"><div class=\"card-header\"><h2><i class=\"fas fa-user-clock\"></i> آخر 5 دفعات</h2></div><table class=\"dtbl\"><thead><tr><th>المريض</th><th>الخدمة</th><th>المبلغ</th></tr></thead><tbody>"+paysHtml+"</tbody></table></div>"+
    "</div>";
  
  new Chart(document.getElementById("chartDays"), {
    type:"bar",
    data:{labels:days7.map(function(d){return d.label}),datasets:[{label:"الإيرادات (دينار)",data:days7.map(function(d){return d.rev}),backgroundColor:"rgba(200,164,92,.7)",borderRadius:8,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:"rgba(200,164,92,.08)"},ticks:{font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
  });
  
  var pmColors=["#3A8C5F","#4A8FC4","#DC5858","#2A6B7C","#C8A45C","#D4952E","#A8853E"];
  var pmLabels = Object.keys(pmBreak).map(function(k){return pmName(k)});
  var pmVals = Object.values(pmBreak);
  if(pmLetters.length){
    new Chart(document.getElementById("chartPM"), {
      type:"doughnut",
      data:{labels:pmLabels,datasets:[{data:pmVals,backgroundColor:pmColors,borderWidth:3,borderColor:"#0D1B1E"}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:10},padding:10,color:"#C4BAA8"}}}}
    });
  }
}
/* REPORTS */
async function viewReports() {
  setLoading();
  if(!allPayments.length) await loadAll();
  var now = new Date();
  var todayStr = now.toISOString().slice(0,10);
  var week = new Date(Date.now()-7*864e5).toISOString();
  var month = new Date(now.getFullYear(),now.getMonth(),1).toISOString();
  var todayRev = allPayments.filter(function(p){return p.payment_date?.slice(0,10)===todayStr}).reduce(function(s,p){return s+Number(p.amount)},0);
  var weekRev = allPayments.filter(function(p){return p.payment_date>=week}).reduce(function(s,p){return s+Number(p.amount)},0);
  var monthRev = allPayments.filter(function(p){return p.payment_date>=month}).reduce(function(s,p){return s+Number(p.amount)},0);
  var totalRev = allPayments.reduce(function(s,p){return s+Number(p.amount)},0);
  var svcMap = {};
  allPayments.forEach(function(p){
    if(!svcMap[p.procedure_name])svcMap[p.procedure_name]={count:0,total:0};
    svcMap[p.procedure_name].count++;
    svcMap[p.procedure_name].total+=Number(p.amount);
  });
  var topSvcs = Object.entries(svcMap).sort(function(a,b){return b[1].total-a[1].total}).slice(0,10);
  var topHtml = "";
  if(topSvcs.length){
    topSvcs.forEach(function(item,i){
      topHtml += "<tr><td><span style=\"background:rgba(42,107,124,.15);color:var(--teal-light);padding:3px 9px;border-radius:8px;font-weight:700\">"+(i+1)+"</span></td><td class=\"fw-bold\">"+item[0]+"</td><td>"+item[1].count+"</td><td class=\"text-success\">"+fmtCur(item[1].total)+"</td></tr>";
    });
  } else {
    topHtml = "<tr><td colspan=\"4\" class=\"text-muted\" style=\"text-align:center;padding:30px\">لا توجد بيانات</td></tr>";
  }
  document.getElementById("view").innerHTML =
    "<div class=\"stats-grid\">"+
      "<div class=\"stat-card sc-green\"><div class=\"sc-icon\"><i class=\"fas fa-calendar-day\"></i></div><div class=\"sc-val\" style=\"font-size:1.2rem\">"+fmtCur(todayRev)+"</div><div class=\"sc-label\">اليوم</div></div>"+
      "<div class=\"stat-card sc-purple\"><div class=\"sc-icon\"><i class=\"fas fa-calendar-week\"></i></div><div class=\"sc-val\" style=\"font-size:1.2rem\">"+fmtCur(weekRev)+"</div><div class=\"sc-label\">هذا الأسبوع</div></div>"+
      "<div class=\"stat-card sc-orange\"><div class=\"sc-icon\"><i class=\"fas fa-calendar-alt\"></i></div><div class=\"sc-val\" style=\"font-size:1.2rem\">"+fmtCur(monthRev)+"</div><div class=\"sc-label\">هذا الشهر</div></div>"+
      "<div class=\"stat-card sc-green\"><div class=\"sc-icon\"><i class=\"fas fa-wallet\"></i></div><div class=\"sc-val\" style=\"font-size:1.1rem\">"+fmtCur(totalRev)+"</div><div class=\"sc-label\">الإجمالي الكلي</div></div>"+
    "</div>"+
    "<div class=\"card\"><div class=\"card-header\"><h2><i class=\"fas fa-trophy\"></i> أفضل الخدمات إيراداً</h2></div><table class=\"dtbl\"><thead><tr><th>#</th><th>الخدمة</th><th>عدد المرات</th><th>الإجمالي</th></tr></thead><tbody>"+topHtml+"</tbody></table></div>";
}

/* PATIENTS */
async function viewPatients() {
  setLoading();
  var {data} = await db.from("patients").select("*").order("created_at",{ascending:false});
  allPatients = data||[];
  renderPatientsView();
}
function renderPatientsView(list){
  list = list||allPatients;
  document.getElementById("view").innerHTML =
    "<div class=\"filter-bar\">"+
      "<div class=\"search-box\"><i class=\"fas fa-search\"></i><input id=\"ptSrch\" placeholder=\"بحث بالاسم، الهاتف، رقم الملف...\" oninput=\"filterAdminPts()\"></div>"+
      "<select id=\"ptClinicF\" onchange=\"filterAdminPts()\"><option value=\"\">كل العيادات</option><option value=\"dental\">الأسنان</option><option value=\"cosmetic\">التجميل</option><option value=\"derma\">الجلدية</option><option value=\"general\">العامة</option><option value=\"ent\">أنف وأذن</option></select>"+
      "<select id=\"ptStatusF\" onchange=\"filterAdminPts()\"><option value=\"\">كل الحالات</option><option value=\"waiting\">انتظار</option><option value=\"in_progress\">علاج</option><option value=\"completed\">مكتمل</option><option value=\"paid\">مدفوع</option></select>"+
      "<span class=\"text-muted\" id=\"ptCount\">"+list.length+" مريض</span>"+
    "</div>"+
    "<div class=\"card\"><div class=\"tbl-wrap\"><table class=\"dtbl\"><thead><tr><th>#ملف</th><th>الاسم</th><th>الهاتف</th><th>العمر</th><th>العيادة</th><th>الحالة</th><th>التاريخ</th><th>بواسطة</th><th>إجراء</th></tr></thead><tbody id=\"ptBody\">"+renderPtRows(list)+"</tbody></table></div></div>";
}
function renderPtRows(list){
  if(!list.length) return "<tr><td colspan=\"9\"><div class=\"empty-state\"><i class=\"fas fa-users\"></i><p>لا يوجد مرضى</p></div></td></tr>";
  var h="";
  list.forEach(function(p){
    h += "<tr>"+
      "<td class=\"fw-bold\">"+(p.file_number||"")+"</td>"+
      "<td><b>"+p.name+"</b><br><span class=\"text-muted\">"+(p.gender==="male"?"ذكر":"أنثى")+"</span></td>"+
      "<td dir=\"ltr\">"+p.phone+"</td>"+
      "<td><span class=\"age-pill\">"+fmtAge(p.birth_date)+"</span></td>"+
      "<td><span class=\"clinic-tag\">"+clinicName(p.clinic_id)+"</span></td>"+
      "<td>"+statusBadge(p.status)+"</td>"+
      "<td>"+fmt(p.created_at)+"<br><span class=\"text-muted\">"+fmtT(p.created_at)+"</span></td>"+
      "<td class=\"text-muted\" style=\"font-size:.8rem\">"+(p.created_by||"-")+"</td>"+
      "<td><button class=\"btn btn-xs btn-danger\" onclick=\"adminDeletePt('"+p.id+"','"+p.name.replace(/'/g,"\\'")+"')\"><i class=\"fas fa-trash\"></i></button></td>"+
    "</tr>";
  });
  return h;
}
function filterAdminPts(){
  var q=(document.getElementById("ptSrch")?.value||"").toLowerCase();
  var cl=document.getElementById("ptClinicF")?.value||"";
  var st=document.getElementById("ptStatusF")?.value||"";
  var filtered=allPatients.filter(function(p){
    return (!q||p.name.toLowerCase().includes(q)||p.phone.includes(q)||String(p.file_number).includes(q))
      &&(!cl||p.clinic_id===cl)
      &&(!st||p.status===st);
  });
  document.getElementById("ptBody").innerHTML=renderPtRows(filtered);
  document.getElementById("ptCount").textContent=filtered.length+" مريض";
}
async function adminDeletePt(id,name){
  if(!confirm("حذف المريض \""+name+"\"؟")) return;
  await db.from("patients").delete().eq("id",id);
  allPatients=allPatients.filter(function(p){return p.id!==id});
  showToast("تم حذف المريض","warning");
  filterAdminPts();
}
/* PAYMENTS */
async function viewPayments() {
  setLoading();
  var {data}=await db.from("payments").select("*").order("payment_date",{ascending:false});
  allPayments=data||[];
  renderPaymentsView(allPayments);
}
function renderPaymentsView(list){
  var total=list.reduce(function(s,p){return s+Number(p.amount)},0);
  document.getElementById("view").innerHTML=
    "<div class=\"filter-bar\">"+
      "<div class=\"search-box\"><i class=\"fas fa-search\"></i><input id=\"paySrch\" placeholder=\"بحث...\" oninput=\"filterAdminPays()\"></div>"+
      "<select id=\"payMethodF\" onchange=\"filterAdminPays()\"><option value=\"\">كل طرق الدفع</option><option value=\"cash\">نقدي</option><option value=\"visa\">Visa</option><option value=\"mastercard\">Mastercard</option><option value=\"mada\">مدى</option><option value=\"apple\">Apple Pay</option><option value=\"bank\">تحويل</option><option value=\"cliq\">CliQ</option></select>"+
      "<span class=\"text-success fw-bold\" id=\"payTotal\">الإجمالي: "+fmtCur(total)+"</span>"+
    "</div>"+
    "<div class=\"card\"><div class=\"tbl-wrap\"><table class=\"dtbl\"><thead><tr><th>#سند</th><th>المريض</th><th>الإجراء</th><th>المبلغ</th><th>طريقة الدفع</th><th>التاريخ والوقت</th><th>الموظف</th><th>إجراء</th></tr></thead><tbody id=\"payBody\">"+renderPayRows(list)+"</tbody></table></div></div>";
}
function renderPayRows(list){
  if(!list.length) return "<tr><td colspan=\"8\"><div class=\"empty-state\"><i class=\"fas fa-receipt\"></i><p>لا توجد دفعات</p></div></td></tr>";
  var h="";
  list.forEach(function(p){
    var pt=allPatients.find(function(x){return x.id===p.patient_id});
    h+="<tr>"+
      "<td class=\"fw-bold\">#"+(p.receipt_number||p.id.slice(-4).toUpperCase())+"</td>"+
      "<td><b>"+(pt?.name||"&#8212;")+"</b><br><span class=\"text-muted\" style=\"font-size:.78rem\">"+(pt?fmtAge(pt.birth_date):"")+"</span></td>"+
      "<td style=\"font-size:.85rem\">"+p.procedure_name+"</td>"+
      "<td class=\"text-success fw-bold\">"+fmtCur(p.amount)+"</td>"+
      "<td><span class=\"badge\" style=\"background:rgba(42,107,124,.15);color:var(--teal-light)\">"+pmName(p.payment_method)+"</span></td>"+
      "<td>"+fmt(p.payment_date)+"<br><span class=\"text-muted\">"+fmtT(p.payment_date)+"</span></td>"+
      "<td class=\"text-muted\">"+(p.created_by||"-")+"</td>"+
      "<td><button class=\"btn btn-xs btn-danger\" onclick=\"adminDeletePay('"+p.id+"')\"><i class=\"fas fa-trash\"></i></button></td>"+
    "</tr>";
  });
  return h;
}
function filterAdminPays(){
  var q=(document.getElementById("paySrch")?.value||"").toLowerCase();
  var m=document.getElementById("payMethodF")?.value||"";
  var filtered=allPayments.filter(function(p){
    var pt=allPatients.find(function(x){return x.id===p.patient_id});
    return (!q||(pt?.name||"").toLowerCase().includes(q)||p.procedure_name.toLowerCase().includes(q))
      &&(!m||p.payment_method===m);
  });
  document.getElementById("payBody").innerHTML=renderPayRows(filtered);
  document.getElementById("payTotal").textContent="الإجمالي: "+fmtCur(filtered.reduce(function(s,p){return s+Number(p.amount)},0));
}
async function adminDeletePay(id){
  if(!confirm("حذف هذه الدفعة؟")) return;
  await db.from("payments").delete().eq("id",id);
  allPayments=allPayments.filter(function(p){return p.id!==id});
  showToast("تم حذف الدفعة","warning");
  filterAdminPays();
}

    logs.forEach(function(l){

}
